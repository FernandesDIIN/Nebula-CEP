<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Nebula Redraw</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <header class="panel-header">
            <div class="logo-group">
                <span class="title-text" style="font-size:12px; color:white;">🌌 NEBULA REDRAW AI</span>
            </div>
            <button id="toggle-settings" class="icon-btn" title="Configurações">⚙️</button>
        </header>

        <div id="settings-panel" class="settings-panel" style="display: none;">
            <div class="input-group">
                <label>STABILITY AI API KEY (STABLE DIFFUSION)</label>
                <input type="password" id="api-key-input" placeholder="Cole sua chave sk-... aqui">
            </div>
            <button id="btn-save-key" class="btn btn-secondary" style="margin-top: 10px;">Salvar Configuração</button>
        </div>

        <main class="main-content">
            <button id="btn-sync" class="btn btn-secondary">🔄 Sync from Photoshop</button>

            <div class="canvas-area" style="position: relative; overflow: hidden; min-height: 250px; background: #1a1a1a;">
                <div id="empty-state" class="canvas-empty" style="padding-top: 100px;">
                    <p>Faça a seleção com letreiro no PS<br>e clique em Sync.</p>
                </div>
                <img id="preview-image" style="display: none; width: 100%; height: 100%; object-fit: contain; position: absolute; top:0; left:0;" />
            </div>

            <div class="actions-section">
                <button id="btn-execute" class="btn btn-primary disabled">✨ Clean & Redraw Selection</button>
                <div class="grid-2" style="margin-top: 10px;">
                    <button id="btn-apply" class="btn btn-secondary disabled">⬇️ Apply to Layer</button>
                    <button id="btn-clear" class="btn btn-dark">🗑️ Clear Selection</button>
                </div>
            </div>
        </main>

        <footer class="panel-footer">
            <span id="system-message">Aguardando comando...</span>
            <div class="api-status">
                <div id="status-dot" class="status-dot red"></div>
                <span id="api-status-text">API Missing</span>
            </div>
        </footer>
    </div>

    <script src="CSInterface.js"></script>
    <script src="main.js"></script>
</body>
</html>
